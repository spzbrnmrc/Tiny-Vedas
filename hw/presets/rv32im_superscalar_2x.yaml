# Baseline Tiny-Vedas: 4-stage in-order scalar RV32IM (shipping RTL).
name: rv32im_superscalar_2x
version: 1
description: >
  4-stage in-order scalar pipeline with Harvard ICCM/DCCM. Superscalar.

cpu:
  kind: superscalar
  isa: rv32im
  issue_width: 2
  out_of_order: false
  exu:
    - alu: true
      mul: false
      div: false
      lsu: true
    - alu: true
      mul: true
      div: true
      lsu: false

vector:
  enabled: false
  width_bits: 0
  lanes: 0
  local_mem_bytes: 0

memory:
  iccm_depth_words: 262144   # 2^18
  dccm_depth_words: 262144   # 2^18
  link_address: 0x00100000
  uart_address: 0x00200000
  eot_address: 0x10000000

software:
  vliw_compiler: true
  materializer: flat_row_major
  vectorize_min_numel: 0     # 0 = scalar-only lowering until vector unit lands
