name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-verilator:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: make deps

      - name: Regenerate decoder
        run: make decodes

      - name: Run smoke regression (Verilator)
        run: make smoke-verilator
