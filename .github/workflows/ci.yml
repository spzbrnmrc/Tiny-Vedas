name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-verilator:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      # Pin for reproducible CI and a stable Actions cache key (bump when upgrading Verilator).
      VERILATOR_TAG: v5.048
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Verilator
        uses: actions/cache@v4
        with:
          path: .local/verilator
          key: verilator-${{ runner.os }}-${{ env.VERILATOR_TAG }}

      - name: Install dependencies
        run: make deps

      - name: Regenerate decoder
        run: make decodes

      - name: Run smoke regression (Verilator)
        run: make smoke-verilator

  pd-synth:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      ORFS_IMAGE: openroad/orfs:26Q2-446-g85d92b593
      SV2V_TAG: v0.0.13
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache sv2v
        uses: actions/cache@v4
        with:
          path: deps/sv2v
          key: sv2v-${{ runner.os }}-${{ env.SV2V_TAG }}

      - name: PD synthesis smoke (ORFS Docker)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-yaml haskell-stack
          make pd-synth
